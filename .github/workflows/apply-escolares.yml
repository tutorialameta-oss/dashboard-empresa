name: Generar código mejorado

on:
  push:
    branches:
      - codex/escolares-reportes-notas-20260719
    paths:
      - trigger-apply.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: codex/escolares-reportes-notas-20260719

      - name: Aplicar mejoras
        run: |
          python tools/apply_escolares_reportes_notas.py
          cp index.html index_mejorado.txt

      - name: Guardar resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html index_mejorado.txt
          git commit -m "Generar index mejorado [skip ci]" || exit 0
          git push
