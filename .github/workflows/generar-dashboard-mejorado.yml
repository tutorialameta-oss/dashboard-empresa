name: Generar dashboard mejorado

on:
  push:
    branches:
      - codex/escolares-reportes-notas-20260719
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama de trabajo
        uses: actions/checkout@v4
        with:
          ref: codex/escolares-reportes-notas-20260719

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aplicar mejoras
        run: python tools/apply_escolares_reportes_notas.py

      - name: Crear TXT final
        run: cp index.html dashboard_con_mejoras_escolares_reportes_notas.txt

      - name: Guardar archivos generados en la rama
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html dashboard_con_mejoras_escolares_reportes_notas.txt
          if git diff --cached --quiet; then
            echo "No hay cambios para guardar"
          else
            git commit -m "Generar dashboard con mejoras de escolares y reportes"
            git push origin HEAD:codex/escolares-reportes-notas-20260719
          fi

      - name: Publicar TXT como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-con-mejoras
          path: dashboard_con_mejoras_escolares_reportes_notas.txt
          if-no-files-found: error
